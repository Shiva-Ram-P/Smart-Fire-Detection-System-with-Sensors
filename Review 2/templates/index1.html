<!DOCTYPE html>
<html>
<head>
<title>Food Delivery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card {
    width: 380px;
    text-align:center;
}
.form-control {
    max-width:280px;
    margin:auto;
}
</style>
</head>

<body class="bg-light">

<div class="card p-4 shadow">

<h3>🍔 Food Delivery</h3>

<ul style="list-style:none;">
{% for food, price in menu.items() %}
<li>{{ food }} - ₹{{ price }}</li>
{% endfor %}
</ul>

<form action="/order" method="post">
<input class="form-control mb-2" name="name" placeholder="Name" required>
<input class="form-control mb-2" name="order" placeholder="Order (pizza...)" required>
<input class="form-control mb-2" type="number" name="distance" placeholder="Distance (km)" required>

<select class="form-control mb-2" name="traffic">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button class="btn btn-warning w-100">Place Order</button>
</form>

<a href="/analytics" class="btn btn-info mt-3 w-100">📊 Analytics</a>

</div>

</body>
</html>
