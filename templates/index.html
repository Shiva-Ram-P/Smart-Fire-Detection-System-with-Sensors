<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery System</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">    
    <style>
body{
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("{{ url_for('static', filename='background.png') }}");
    background-size: cover;
    background-position: center;
    font-family: Arial;
    text-align: center;
    color: white;
}

h1{
    color: #ffffff;
}

.menu{
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    width: 320px;
    margin: auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    color: white;
}

input,select{
    padding:10px;
    margin:8px;
    width:85%;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    background-color:#ff6b35;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background-color:#e85a2a;
}
</style>
</head>

<body>

<h1>🍔 Online Food Delivery</h1>

<div class="menu">

<h3>Menu</h3>

<ul style="list-style:none; padding:0;">
{% for food,price in menu.items() %}
<li>{{food}} - ₹{{price}}</li>
{% endfor %}
</ul>

<hr>

<form action="/order" method="POST">

<input type="text" name="name" placeholder="Enter Your Name" required><br>

<input type="text" name="order" placeholder="Enter food name (pizza, burger...)" required><br>

<input type="number" name="distance" placeholder="Distance (km)" required><br>

<select name="traffic">
<option value="low">Low Traffic</option>
<option value="medium">Medium Traffic</option>
<option value="high">High Traffic</option>
</select><br>

<button type="submit">Place Order</button>

</form>

</div>

</body>
</html>
