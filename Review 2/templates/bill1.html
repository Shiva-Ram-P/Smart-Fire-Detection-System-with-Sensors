<!DOCTYPE html>
<html>
<head>
<title>Bill</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card {
    width:380px;
    text-align:center;
}
</style>

</head>

<body class="bg-light">

<div class="card p-4 shadow">

<h3>🧾 Bill</h3>

<hr>

<p><b>Name:</b> {{ name }}</p>

<hr>

<h5>Items</h5>
<ul style="list-style:none;">
{% for f in foods %}
<li>{{ f }} - ₹{{ menu[f] }}</li>
{% endfor %}
</ul>

<hr>

<p><b>Total Amount:</b> ₹{{ total }}</p>
<p><b>Delivery Charges:</b> ₹{{ charge }}</p>

<hr>

<h5><b>Final Bill:</b> ₹{{ final_total }}</h5>

<p>⏱ Estimated Time: {{ time }} mins</p>

<a href="/" class="btn btn-primary w-100">Back</a>

</div>

</body>
</html>
