<!DOCTYPE html>
<html>
<head>
<title>Smart Food Delivery System</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(to right,#ff9966,#ff5e62);
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid gray;
}

button{
    width:100%;
    padding:12px;
    background:#ff5e62;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff3b3f;
}

.menu{
    background:#f5f5f5;
    padding:10px;
    border-radius:5px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🍔 Smart Food Delivery</h2>

<div class="menu">
<b>MENU</b><br>
Pizza - ₹150<br>
Burger - ₹100<br>
Biryani - ₹180<br>
Pasta - ₹120<br>
Sandwich - ₹90
</div>

<form action="/order" method="post">

<label>Customer Name</label>
<input type="text" name="name" required>

<label>What would you like to order?</label>
<textarea name="order" placeholder="Example: I want pizza and burger"></textarea>

<label>Distance (km)</label>
<input type="number" name="distance" required>

<label>Traffic</label>
<select name="traffic">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button type="submit">Place Order</button>

</form>

</div>

</body>
</html>
